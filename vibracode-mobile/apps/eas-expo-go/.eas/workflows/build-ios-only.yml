name: Build iOS Only

jobs:
  # Step 1: Publish JS bundle via EAS Update
  publish_update:
    type: update
    params:
      platform: ios
      branch: production
      message: "Production update"

  # Step 2: Build iOS app (no submit)
  build_ios:
    type: build
    needs: [publish_update]
    params:
      platform: ios
      profile: release-client
