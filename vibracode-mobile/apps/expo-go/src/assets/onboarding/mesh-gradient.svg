<svg xmlns="http://www.w3.org/2000/svg" id="mesh-gradient"
	    width="500" height="1000" viewBox="0 0 500 1000" >
	        <defs>
	            <filter id="blur" filterUnits="userSpaceOnUse" x="0" y="0" width="500" height="1000">
	                <feGaussianBlur stdDeviation="100" />
	            </filter>
	            <image id="noise-image" width="100" height="100" href="data:image/png;base64," />
	        </defs>
	        <rect id="background" width="100%" height="100%" fill="#0091FF" />
	        <g id="swatches" width="500" height="1000" filter="url(#blur)">
	            <rect x="-100" y="-150" width="700" height="400" fill="#0A1A2E" />
	            <rect x="-165" y="313" width="593" height="503" fill="#003CFF" />
	            <rect x="141" y="-116" width="348" height="590" fill="#5DA6F0" />
	        </g>
	        <g id="noise" width="500" height="1000" style="mix-blend-mode: luminosity; opacity: 20%">
	            <use href="#noise-image" x="0" y="0" width="100px" height="100px"></use>
	            <use href="#noise-image" x="100" y="0" width="100px" height="100px"></use>
	            <use href="#noise-image" x="200" y="0" width="100px" height="100px"></use>
	            <use href="#noise-image" x="300" y="0" width="100px" height="100px"></use>
	            <use href="#noise-image" x="400" y="0" width="100px" height="100px"></use>
	            <use href="#noise-image" x="0" y="100" width="100px" height="100px"></use>
	            <use href="#noise-image" x="100" y="100" width="100px" height="100px"></use>
	            <use href="#noise-image" x="200" y="100" width="100px" height="100px"></use>
	            <use href="#noise-image" x="300" y="100" width="100px" height="100px"></use>
	            <use href="#noise-image" x="400" y="100" width="100px" height="100px"></use>
	            <use href="#noise-image" x="0" y="200" width="100px" height="100px"></use>
	            <use href="#noise-image" x="100" y="200" width="100px" height="100px"></use>
	            <use href="#noise-image" x="200" y="200" width="100px" height="100px"></use>
	            <use href="#noise-image" x="300" y="200" width="100px" height="100px"></use>
	            <use href="#noise-image" x="400" y="200" width="100px" height="100px"></use>
	            <use href="#noise-image" x="0" y="300" width="100px" height="100px"></use>
	            <use href="#noise-image" x="100" y="300" width="100px" height="100px"></use>
	            <use href="#noise-image" x="200" y="300" width="100px" height="100px"></use>
	            <use href="#noise-image" x="300" y="300" width="100px" height="100px"></use>
	            <use href="#noise-image" x="400" y="300" width="100px" height="100px"></use>
	            <use href="#noise-image" x="0" y="400" width="100px" height="100px"></use>
	            <use href="#noise-image" x="100" y="400" width="100px" height="100px"></use>
	            <use href="#noise-image" x="200" y="400" width="100px" height="100px"></use>
	            <use href="#noise-image" x="300" y="400" width="100px" height="100px"></use>
	            <use href="#noise-image" x="400" y="400" width="100px" height="100px"></use>
	            <use href="#noise-image" x="0" y="500" width="100px" height="100px"></use>
	            <use href="#noise-image" x="100" y="500" width="100px" height="100px"></use>
	            <use href="#noise-image" x="200" y="500" width="100px" height="100px"></use>
	            <use href="#noise-image" x="300" y="500" width="100px" height="100px"></use>
	            <use href="#noise-image" x="400" y="500" width="100px" height="100px"></use>
	            <use href="#noise-image" x="0" y="600" width="100px" height="100px"></use>
	            <use href="#noise-image" x="100" y="600" width="100px" height="100px"></use>
	            <use href="#noise-image" x="200" y="600" width="100px" height="100px"></use>
	            <use href="#noise-image" x="300" y="600" width="100px" height="100px"></use>
	            <use href="#noise-image" x="400" y="600" width="100px" height="100px"></use>
	            <use href="#noise-image" x="0" y="700" width="100px" height="100px"></use>
	            <use href="#noise-image" x="100" y="700" width="100px" height="100px"></use>
	            <use href="#noise-image" x="200" y="700" width="100px" height="100px"></use>
	            <use href="#noise-image" x="300" y="700" width="100px" height="100px"></use>
	            <use href="#noise-image" x="400" y="700" width="100px" height="100px"></use>
	            <use href="#noise-image" x="0" y="800" width="100px" height="100px"></use>
	            <use href="#noise-image" x="100" y="800" width="100px" height="100px"></use>
	            <use href="#noise-image" x="200" y="800" width="100px" height="100px"></use>
	            <use href="#noise-image" x="300" y="800" width="100px" height="100px"></use>
	            <use href="#noise-image" x="400" y="800" width="100px" height="100px"></use>
	            <use href="#noise-image" x="0" y="900" width="100px" height="100px"></use>
	            <use href="#noise-image" x="100" y="900" width="100px" height="100px"></use>
	            <use href="#noise-image" x="200" y="900" width="100px" height="100px"></use>
	            <use href="#noise-image" x="300" y="900" width="100px" height="100px"></use>
	            <use href="#noise-image" x="400" y="900" width="100px" height="100px"></use>
	        </g>
    	</svg>